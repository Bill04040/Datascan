<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Datascan · Geocode Tester v1.0.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,'Helvetica Neue',sans-serif;background:#0f1e30;color:#f0f4f8;min-height:100vh;padding:1.5rem}
.header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
.header-logo{font-size:20px;font-weight:900;color:#fff;letter-spacing:.06em}
.header-logo span{color:#6AB34F}
.header-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:2px}
.card{background:#162840;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.field{margin-bottom:.875rem}
.field label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.field input,.field select{width:100%;padding:11px 13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:15px;font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:#1E5FAE}
.field input::placeholder{color:rgba(255,255,255,.3)}
.row2{display:grid;grid-template-columns:1fr 80px;gap:.75rem}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;background:#1E5FAE;border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .15s}
.btn:hover{background:#174d8e}
.btn:disabled{background:rgba(255,255,255,.15);color:rgba(255,255,255,.4);cursor:not-allowed}
.btn-clear{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:.5rem}
.btn-clear:hover{background:rgba(255,255,255,.12)}

/* Results */
.result-row{display:flex;align-items:flex-start;gap:10px;padding:.625rem 0;border-bottom:1px solid rgba(255,255,255,.07)}
.result-row:last-child{border-bottom:none}
.result-label{font-size:12px;color:rgba(255,255,255,.45);width:110px;flex-shrink:0;padding-top:1px;font-weight:500}
.result-value{font-size:13px;color:#f0f4f8;font-family:monospace;flex:1;word-break:break-all}
.result-value.ok{color:#6AB34F;font-weight:700}
.result-value.err{color:#f87171;font-weight:700}
.result-value.warn{color:#F4A93A;font-weight:700}
.result-value.coords{color:#90b8f0;font-size:14px;font-weight:700}

/* Confidence bar */
.confidence-wrap{flex:1}
.confidence-bar-bg{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-top:4px}
.confidence-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.confidence-label{font-size:12px;font-weight:700;margin-bottom:2px}

/* Map */
#map{width:100%;height:300px;border-radius:10px;background:#0d1e30;border:1px solid rgba(255,255,255,.1);margin-top:.75rem}

/* JSON panel */
.json-panel{background:#0d1e30;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:1rem;max-height:320px;overflow-y:auto;font-family:monospace;font-size:11px;line-height:1.6;color:#a0b4c8;white-space:pre;margin-top:.75rem}
.json-string{color:#a0d890}
.json-number{color:#90b8f0}
.json-key{color:#FAC775}
.json-bool{color:#f87171}
.json-null{color:rgba(255,255,255,.4)}

/* Status badge */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.status-ok{background:rgba(106,179,79,.2);color:#6AB34F}
.status-err{background:rgba(163,45,45,.25);color:#f87171}
.status-zero{background:rgba(244,169,58,.15);color:#F4A93A}

/* Spinner */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Query display */
.query-pill{background:rgba(30,95,174,.2);border:1px solid rgba(30,95,174,.4);border-radius:6px;padding:4px 10px;font-size:12px;color:#90b8f0;font-family:monospace;display:inline-block;word-break:break-all}

.hidden{display:none}
</style>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD2P07dJGflMhKsUCVtrltsWxSee6Fw0_M"></script>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">DATASCAN <span>GEOCODE</span> TESTER</div>
    <div class="header-sub">Google Maps Geocoding API · Debug Tool · v1.0.1</div>
  </div>
</div>

<!-- Input card -->
<div class="card">
  <div class="card-title">Address Input</div>
  <div class="field">
    <label>Customer / Client name</label>
    <input type="text" id="f-customer" placeholder="e.g. NAPA Auto Parts" value="NAPA Auto Parts"/>
  </div>
  <div class="field">
    <label>Street address <span style="font-size:10px;color:rgba(255,255,255,.35);text-transform:none;font-weight:400">(optional — improves accuracy)</span></label>
    <input type="text" id="f-address" placeholder="e.g. 1234 Main St"/>
  </div>
  <div class="row2">
    <div class="field" style="margin-bottom:0">
      <label>City</label>
      <input type="text" id="f-city" placeholder="City" value="Semmes"/>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>State</label>
      <input type="text" id="f-state" placeholder="AL" maxlength="2"
        style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()" value="AL"/>
    </div>
  </div>
  <div style="margin-top:1rem">
    <button class="btn" id="test-btn" onclick="runTest()">
      Test Geocode
    </button>
    <button class="btn btn-clear" onclick="clearResults()">Clear results</button>
  </div>
</div>

<!-- Results card -->
<div class="card hidden" id="results-card">
  <div class="card-title">Results</div>

  <div class="result-row">
    <div class="result-label">Status</div>
    <div class="result-value" id="r-status">—</div>
  </div>
  <div class="result-row">
    <div class="result-label">Query sent</div>
    <div class="result-value" id="r-query">—</div>
  </div>
  <div class="result-row">
    <div class="result-label">Response time</div>
    <div class="result-value" id="r-time">—</div>
  </div>
  <div class="result-row">
    <div class="result-label">Results found</div>
    <div class="result-value" id="r-count">—</div>
  </div>

  <!-- Best result section -->
  <div id="best-result-section" class="hidden">
    <div style="margin:.75rem 0 .5rem;font-size:12px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em">Best Result</div>

    <div class="result-row">
      <div class="result-label">Formatted</div>
      <div class="result-value" id="r-formatted">—</div>
    </div>
    <div class="result-row">
      <div class="result-label">Latitude</div>
      <div class="result-value coords" id="r-lat">—</div>
    </div>
    <div class="result-row">
      <div class="result-label">Longitude</div>
      <div class="result-value coords" id="r-lng">—</div>
    </div>
    <div class="result-row">
      <div class="result-label">Place ID</div>
      <div class="result-value" id="r-place-id" style="font-size:11px">—</div>
    </div>
    <div class="result-row">
      <div class="result-label">Location type</div>
      <div class="result-value" id="r-loc-type">—</div>
    </div>
    <div class="result-row">
      <div class="result-label">Confidence</div>
      <div class="confidence-wrap" id="r-confidence">—</div>
    </div>
    <div class="result-row">
      <div class="result-label">Address types</div>
      <div class="result-value" id="r-types">—</div>
    </div>
    <div class="result-row">
      <div class="result-label">Viewport</div>
      <div class="result-value" id="r-viewport" style="font-size:11px">—</div>
    </div>

    <!-- Map -->
    <div id="map"></div>
  </div>
</div>

<!-- Raw JSON card -->
<div class="card hidden" id="json-card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
    <div class="card-title" style="margin-bottom:0">Raw JSON Response</div>
    <button onclick="copyJson()" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:4px 10px;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;font-family:inherit">
      Copy
    </button>
  </div>
  <div class="json-panel" id="json-panel"></div>
</div>

<script>
const MAPS_KEY    = 'AIzaSyD2P07dJGflMhKsUCVtrltsWxSee6Fw0_M';
const GEOCODE_KEY = 'AIzaSyAYqPNgPh3jdMyRiO4kUhSUPd3b9GsdnkI';
let _map = null;
let _marker = null;
let _lastJson = null;

// ── Confidence scoring based on location_type ─────────────────────────────────
function getConfidence(locationType, types){
  const typeScores = {
    'ROOFTOP':            { score:98, label:'Rooftop — exact address match',     color:'#6AB34F' },
    'RANGE_INTERPOLATED': { score:75, label:'Range interpolated — street level', color:'#F4A93A' },
    'GEOMETRIC_CENTER':   { score:55, label:'Geometric center — area/region',    color:'#F4A93A' },
    'APPROXIMATE':        { score:30, label:'Approximate — city/zip level',      color:'#f87171' },
  };
  const base = typeScores[locationType] || { score:20, label:'Unknown accuracy', color:'#f87171' };

  // Boost for specific address types
  let boost = 0;
  if(types?.includes('street_address'))    boost += 5;
  if(types?.includes('premise'))           boost += 3;
  if(types?.includes('establishment'))     boost += 2;
  if(types?.includes('route'))             boost -= 5;
  if(types?.includes('locality'))          boost -= 10;
  if(types?.includes('postal_code'))       boost -= 5;

  return {
    score: Math.min(100, Math.max(0, base.score + boost)),
    label: base.label,
    color: base.color,
  };
}

// ── Main test function ────────────────────────────────────────────────────────
async function runTest(){
  const customer = document.getElementById('f-customer').value.trim();
  const address  = document.getElementById('f-address').value.trim();
  const city     = document.getElementById('f-city').value.trim();
  const state    = document.getElementById('f-state').value.trim().toUpperCase();

  if(!city || !state){
    alert('City and State are required'); return;
  }

  const queryStr = address
    ? [address, city, state].filter(Boolean).join(', ')
    : [customer, city, state].filter(Boolean).join(', ');

  // Show loading state
  const btn = document.getElementById('test-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Testing...';

  document.getElementById('results-card').classList.remove('hidden');
  document.getElementById('r-status').innerHTML = '<span class="spinner"></span>';
  document.getElementById('r-query').innerHTML  = `<span class="query-pill">${escHtml(queryStr)}</span>`;
  document.getElementById('r-time').textContent  = '…';
  document.getElementById('r-count').textContent = '…';
  document.getElementById('best-result-section').classList.add('hidden');
  document.getElementById('json-card').classList.add('hidden');

  // ── Use Maps JS API Geocoder (browser-authorized, no CORS/referer issues) ────
  // NOTE: The REST Geocoding API cannot be called via fetch() from a browser
  // when the key has HTTP referrer restrictions. The JS API Geocoder is the
  // correct approach for browser-based geocoding.
  const t0 = performance.now();
  let rawData = null;

  if(!window.google?.maps?.Geocoder){
    document.getElementById('r-status').innerHTML = `<span class="status-badge status-err">MAPS API NOT LOADED</span>`;
    document.getElementById('r-time').textContent = '—';
    document.getElementById('r-count').textContent = '0';
    showJson({error:'Google Maps JS API not loaded. Check the API key and script tag.'});
    btn.disabled = false;
    btn.innerHTML = 'Test Geocode';
    return;
  }

  // Use REST Geocoding API with unrestricted key (no referer restriction)
  try{
    const url = 'https://maps.googleapis.com/maps/api/geocode/json?address='
      + encodeURIComponent(queryStr) + '&key=AIzaSyAYqPNgPh3jdMyRiO4kUhSUPd3b9GsdnkI';
    const resp = await fetch(url);
    rawData = await resp.json();
    rawData._note = 'Response via REST Geocoding API with unrestricted key';
  } catch(fetchErr){
    rawData = {
      status: 'ERROR',
      error_message: fetchErr.message,
      results: [],
      _note: 'fetch() failed — check network connection'
    };
  }

  const elapsed = Math.round(performance.now() - t0);
  btn.disabled = false;
  btn.innerHTML = 'Test Geocode';

  _lastJson = rawData;

  // Status
  const statusEl = document.getElementById('r-status');
  const status   = rawData.status;
  if(status === 'OK'){
    statusEl.innerHTML = `<span class="status-badge status-ok">✓ OK</span>`;
  } else if(status === 'ZERO_RESULTS'){
    statusEl.innerHTML = `<span class="status-badge status-zero">⚠ ZERO_RESULTS — Try adding street address or checking spelling</span>`;
  } else if(status === 'ERROR'){
    statusEl.innerHTML = `<span class="status-badge status-err">✗ ERROR — ${escHtml(rawData.error_message||'unknown')}</span>`;
  } else {
    statusEl.innerHTML = `<span class="status-badge status-err">${escHtml(status)}</span>`;
  }

  document.getElementById('r-time').textContent  = elapsed + 'ms';
  document.getElementById('r-count').textContent = (rawData.results?.length || 0) + ' result(s)';

  // Best result
  if(rawData.results?.length > 0){
    const best = rawData.results[0];
    const loc  = best.geometry?.location;   // already plain {lat,lng} from our mapping above
    const vp   = best.geometry?.viewport;   // already plain {northeast,southwest}
    const lt   = best.geometry?.location_type;
    const conf = getConfidence(lt, best.types);

    document.getElementById('best-result-section').classList.remove('hidden');
    document.getElementById('r-formatted').textContent = best.formatted_address || '—';
    document.getElementById('r-lat').textContent       = loc?.lat ?? '—';
    document.getElementById('r-lng').textContent       = loc?.lng ?? '—';
    document.getElementById('r-place-id').textContent  = best.place_id || '—';
    document.getElementById('r-loc-type').textContent  = lt || '—';
    document.getElementById('r-types').textContent     = (best.types||[]).join(', ') || '—';

    if(vp){
      document.getElementById('r-viewport').textContent =
        `SW: ${vp.southwest?.lat?.toFixed?.(5)??vp.southwest?.lat}, ${vp.southwest?.lng?.toFixed?.(5)??vp.southwest?.lng}  ` +
        `NE: ${vp.northeast?.lat?.toFixed?.(5)??vp.northeast?.lat}, ${vp.northeast?.lng?.toFixed?.(5)??vp.northeast?.lng}`;
    }

    // Confidence bar
    document.getElementById('r-confidence').innerHTML = `
      <div class="confidence-label" style="color:${conf.color}">${conf.score}% — ${conf.label}</div>
      <div class="confidence-bar-bg">
        <div class="confidence-bar-fill" style="width:${conf.score}%;background:${conf.color}"></div>
      </div>
    `;

    // Map
    if(loc && window.google?.maps){
      const mapEl = document.getElementById('map');
      if(!_map){
        _map = new google.maps.Map(mapEl, {
          zoom:15,
          center: loc,
          mapTypeId: 'roadmap',
          styles:[
            {featureType:'all',elementType:'geometry',stylers:[{color:'#1a2e4a'}]},
            {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1e30'}]},
            {featureType:'road',elementType:'geometry',stylers:[{color:'#2d4a6a'}]},
            {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#8a9bb0'}]},
            {featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]},
          ]
        });
      } else {
        _map.setCenter(loc);
        _map.setZoom(15);
        if(_marker) _marker.setMap(null);
      }

      _marker = new google.maps.Marker({
        position: loc,
        map: _map,
        title: best.formatted_address,
        icon:{
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#6AB34F',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2,
        }
      });

      // Draw viewport rectangle
      if(vp){
        new google.maps.Rectangle({
          bounds: new google.maps.LatLngBounds(
            new google.maps.LatLng(vp.southwest.lat, vp.southwest.lng),
            new google.maps.LatLng(vp.northeast.lat, vp.northeast.lng)
          ),
          map: _map,
          strokeColor:'#1E5FAE',
          strokeOpacity:.6,
          strokeWeight:1,
          fillColor:'#1E5FAE',
          fillOpacity:.08,
        });
      }
    }
  }

  // Always show raw JSON
  showJson(rawData);
}

// ── Show raw JSON with syntax highlighting ────────────────────────────────────
function showJson(data){
  const el = document.getElementById('json-panel');
  const card = document.getElementById('json-card');
  el.innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));
  card.classList.remove('hidden');
}

function syntaxHighlight(json){
  return json
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match=>{
      let cls = 'json-number';
      if(/^"/.test(match)){
        cls = /:$/.test(match) ? 'json-key' : 'json-string';
      } else if(/true|false/.test(match)){
        cls = 'json-bool';
      } else if(/null/.test(match)){
        cls = 'json-null';
      }
      return `<span class="${cls}">${match}</span>`;
    });
}

function copyJson(){
  if(!_lastJson){ return; }
  navigator.clipboard.writeText(JSON.stringify(_lastJson, null, 2))
    .then(()=>{ alert('JSON copied to clipboard'); })
    .catch(()=>{ alert('Copy failed — select and copy manually'); });
}

function clearResults(){
  document.getElementById('results-card').classList.add('hidden');
  document.getElementById('json-card').classList.add('hidden');
  _lastJson = null;
  if(_marker){ _marker.setMap(null); _marker = null; }
  _map = null;
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Allow Enter key to trigger test
document.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey) runTest();
});
</script>
</body>
</html>
