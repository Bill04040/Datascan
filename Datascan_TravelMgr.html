<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Datascan · Travel Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',Arial,sans-serif;background:#0b1929;color:#e8f0f8;overflow:hidden}
:root{
  --blue:#1E5FAE;--blue2:#2572cc;--green:#6AB34F;--green2:#82cc63;
  --amber:#F4A93A;--red:#f87171;--purple:#a855f7;
  --bg1:#0b1929;--bg2:#111f33;--bg3:#162840;--bg4:#1c3452;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.14);
  --text1:#e8f0f8;--text2:rgba(232,240,248,.60);--text3:rgba(232,240,248,.35);
  --radius:10px;--radius-sm:7px;--shadow:0 4px 24px rgba(0,0,0,.45);
}

/* ── Login ───────────────────────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--bg1);display:flex;
  align-items:center;justify-content:center;z-index:1000}
#login-screen.hidden{display:none}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;
  padding:2rem 2.25rem;width:340px;box-shadow:var(--shadow)}
.login-logo-title{font-size:13px;font-weight:800;letter-spacing:.12em;color:var(--green);
  text-transform:uppercase;text-align:center;margin-bottom:4px}
.login-logo-sub{font-size:11px;color:var(--text3);text-align:center;margin-bottom:1.5rem}
.login-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;
  text-transform:uppercase;margin-bottom:5px;display:block}
.login-input{width:100%;padding:.625rem .75rem;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--text1);font-size:14px;font-family:inherit;margin-bottom:.875rem}
.login-input:focus{outline:none;border-color:var(--blue)}
.login-btn{width:100%;padding:.75rem;background:var(--green);border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.25rem}
.login-btn:hover{background:var(--green2)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:.75rem;min-height:18px}

/* ── App shell ───────────────────────────────────────────────────────────── */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden}

/* ── Topbar / filter bar ─────────────────────────────────────────────────── */
#topbar{display:flex;align-items:center;gap:8px;padding:.5rem .875rem;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;z-index:50}
.tb-brand{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--green);
  text-transform:uppercase;white-space:nowrap}
.tb-sub{font-size:10px;color:var(--text3);letter-spacing:.05em;white-space:nowrap;margin-right:4px}
.tb-sep{width:1px;height:18px;background:var(--border2);flex-shrink:0}
.tb-label{font-size:11px;color:var(--text3);white-space:nowrap}
.filter-input{padding:5px 8px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:6px;color:var(--text1);font-size:12px;font-family:inherit}
.filter-input:focus{outline:none;border-color:var(--blue)}
select.filter-input{cursor:pointer}
.tb-user{font-size:12px;color:var(--text2);white-space:nowrap;margin-left:auto}
.tb-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:6px;
  color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.tb-btn:hover{background:var(--bg4);color:var(--text1)}

/* ── Stats strip (below topbar) ─────────────────────────────────────────── */
#stats-bar{display:flex;gap:1px;background:var(--border);flex-shrink:0;
  border-bottom:1px solid var(--border)}
.stat-cell{flex:1;padding:.3rem .5rem;background:var(--bg2);text-align:center;min-width:0}
.stat-num{font-size:14px;font-weight:700;color:var(--text1);line-height:1.2}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.stat-num.green{color:var(--green)}
.stat-num.amber{color:var(--amber)}
.stat-num.red{color:var(--red)}
.stat-num.blue{color:#7eb8f7}
#live-badge{display:none;align-items:center;gap:4px;font-size:10px;color:var(--green);
  padding:.3rem .75rem;background:var(--bg2);border-left:1px solid var(--border);flex-shrink:0}

/* ── Main area ───────────────────────────────────────────────────────────── */
#main{flex:1;position:relative;overflow:hidden}

/* ── Fleet map ───────────────────────────────────────────────────────────── */
#fleet-map{position:absolute;inset:0;z-index:1}
.leaflet-container{background:#0b1929}

/* Bigger zoom controls */
.leaflet-control-zoom{margin-left:12px !important;margin-bottom:60px !important}
.leaflet-control-zoom a{width:34px !important;height:34px !important;
  line-height:34px !important;font-size:18px !important}

/* ── Trips FAB — sits next to zoom controls ──────────────────────────────── */
#trips-fab{position:absolute;bottom:10px;left:12px;z-index:150;
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:var(--bg2);border:1px solid var(--border2);border-radius:20px;
  color:var(--text1);font-size:12px;font-weight:600;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.5);font-family:inherit}
#trips-fab:hover{background:var(--bg3)}
.fab-badge{font-size:10px;font-weight:800;padding:1px 6px;
  border-radius:8px;background:var(--blue);color:#fff;min-width:18px;text-align:center}

/* ── Map legend ──────────────────────────────────────────────────────────── */
#map-legend{position:absolute;bottom:10px;right:10px;z-index:150;
  background:rgba(17,31,51,.92);border:1px solid var(--border2);
  border-radius:8px;padding:8px 12px;font-size:11px;color:var(--text3);
  backdrop-filter:blur(4px)}
.legend-row{display:flex;align-items:center;gap:7px;padding:2px 0}
.legend-dot{width:12px;height:12px;border-radius:50%;
  border:2px solid rgba(255,255,255,.6);flex-shrink:0}

/* ── Refresh indicator ───────────────────────────────────────────────────── */
#refresh-ring{position:absolute;top:8px;right:8px;z-index:150;
  font-size:10px;color:var(--green);background:rgba(17,31,51,.9);
  border:1px solid rgba(106,179,79,.3);border-radius:6px;
  padding:4px 10px;display:none;align-items:center;gap:5px}

/* ── Trips drawer ────────────────────────────────────────────────────────── */
#trips-drawer{position:absolute;top:0;left:-380px;width:380px;height:100%;
  background:var(--bg2);border-right:1px solid var(--border2);
  z-index:200;display:flex;flex-direction:column;
  transition:left .25s cubic-bezier(.4,0,.2,1);
  box-shadow:4px 0 24px rgba(0,0,0,.4)}
#trips-drawer.open{left:0}
.drawer-header{display:flex;align-items:center;justify-content:space-between;
  padding:.75rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-title{font-size:14px;font-weight:700;color:var(--text1);
  display:flex;align-items:center;gap:8px}
.drawer-close{background:none;border:none;cursor:pointer;color:var(--text3);
  font-size:20px;padding:2px 4px;line-height:1}
.drawer-close:hover{color:var(--text1)}
.drawer-search{padding:.625rem .875rem;border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-search input{width:100%;padding:7px 10px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:6px;font-size:12px;
  color:var(--text1);font-family:inherit}
.drawer-search input:focus{outline:none;border-color:var(--blue)}
.drawer-actions{display:flex;gap:8px;padding:.625rem .875rem;
  border-bottom:1px solid var(--border);flex-shrink:0}
.drawer-btn{flex:1;padding:8px;border-radius:6px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;
  justify-content:center;gap:5px;transition:background .1s}
.dbtn-primary{background:rgba(30,95,174,.2);border:1px solid rgba(30,95,174,.4);color:#7eb8f7}
.dbtn-primary:hover{background:rgba(30,95,174,.35)}
.dbtn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.dbtn-secondary:hover{background:var(--bg4)}
.drawer-body{flex:1;overflow-y:auto}

/* ── Job groups in drawer ────────────────────────────────────────────────── */
.job-group{border-bottom:1px solid var(--border)}
.job-header{padding:.625rem .875rem .4rem;background:var(--bg3);sticky:top;
  font-size:11px;color:var(--text3)}
.job-header-name{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:1px}
.trip-row{display:flex;align-items:flex-start;gap:10px;padding:.625rem .875rem;
  cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.trip-row:hover{background:rgba(255,255,255,.04)}
.trip-row.selected{background:rgba(30,95,174,.1);border-left-color:var(--blue)}
.trip-row-cb{margin-top:2px;flex-shrink:0;accent-color:var(--blue);
  width:15px;height:15px;cursor:pointer}
.trip-row-content{flex:1;min-width:0}
.trip-row-top{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.trip-driver{font-size:12px;font-weight:700;color:var(--text1)}
.trip-leg-badge{font-size:10px;color:var(--text3);background:var(--bg4);
  padding:1px 6px;border-radius:4px;white-space:nowrap}
.trip-time{font-size:10px;color:var(--text3);margin-left:auto;white-space:nowrap}
.trip-row-detail{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.trip-pax-count{font-size:11px;display:flex;align-items:center;gap:3px;
  color:var(--green);font-weight:600}
.trip-pax-names{font-size:10px;color:var(--text3);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}

/* ── RAG + status pills ──────────────────────────────────────────────────── */
.rag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.rag-green{background:rgba(106,179,79,.15);color:#82cc63;border:0.5px solid rgba(106,179,79,.3)}
.rag-amber{background:rgba(244,169,58,.15);color:#FAC775;border:0.5px solid rgba(244,169,58,.3)}
.rag-red{background:rgba(248,113,113,.15);color:#f87171;border:0.5px solid rgba(248,113,113,.3)}
.rag-blue{background:rgba(30,95,174,.2);color:#85B7EB;border:0.5px solid rgba(30,95,174,.35)}
.rag-gray{background:rgba(136,135,128,.15);color:#B4B2A9;border:0.5px solid rgba(136,135,128,.25)}
.sp-boarding{background:rgba(30,95,174,.2);color:#85B7EB;border:0.5px solid rgba(30,95,174,.35)}
.sp-enroute{background:rgba(106,179,79,.15);color:#82cc63;border:0.5px solid rgba(106,179,79,.3)}
.sp-destinated{background:rgba(136,135,128,.15);color:#B4B2A9;border:0.5px solid rgba(136,135,128,.25)}
.status-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}

/* ── Map overlay card ────────────────────────────────────────────────────── */
.map-card{position:absolute;z-index:300;background:rgba(17,31,51,.96);
  border:1px solid var(--border2);border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,.7);width:240px;padding:12px 14px;
  backdrop-filter:blur(8px)}
.map-card-close{position:absolute;top:8px;right:8px;background:none;border:none;
  cursor:pointer;color:var(--text3);font-size:18px;padding:2px 4px;line-height:1}
.map-card-close:hover{color:var(--text1)}
.map-card-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:2px;padding-right:20px}
.map-card-job{font-size:11px;color:var(--text3);margin-bottom:8px}
.map-card-divider{height:0.5px;background:var(--border2);margin:8px 0}
.map-card-row{display:flex;justify-content:space-between;align-items:center;
  padding:3px 0;font-size:11px}
.map-card-lbl{color:var(--text3)}
.map-card-val{color:var(--text1);font-weight:500;text-align:right}
.map-card-btn{width:100%;margin-top:10px;padding:8px;border-radius:6px;
  background:rgba(30,95,174,.2);border:1px solid rgba(30,95,174,.4);
  color:#7eb8f7;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px}
.map-card-btn:hover{background:rgba(30,95,174,.35)}
.hub-card-row{display:flex;align-items:center;gap:8px;padding:6px 4px;
  border-radius:6px;cursor:pointer;transition:background .15s}
.hub-card-row:hover{background:rgba(255,255,255,.06)}
.hub-card-num{width:18px;height:18px;border-radius:50%;color:#fff;font-size:10px;
  font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hub-card-role{font-size:11px;color:var(--text1);flex:1}

/* ── Multi-trip color legend overlay ────────────────────────────────────── */
#trip-color-legend{position:absolute;bottom:10px;right:10px;z-index:150;
  background:rgba(17,31,51,.92);border:1px solid var(--border2);
  border-radius:8px;padding:8px 12px;font-size:11px;display:none;
  backdrop-filter:blur(4px);max-width:200px}
#trip-color-legend.show{display:block}
.tcl-row{display:flex;align-items:center;gap:7px;padding:2px 0}
.tcl-line{width:20px;height:3px;border-radius:2px;flex-shrink:0}
.tcl-label{color:var(--text2);font-size:10px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}

@media(max-width:600px){
  #topbar{padding:.4rem .625rem;gap:6px}
  .tb-sub,.tb-sep:first-of-type{display:none}
  #trips-drawer{width:100%;left:-100%}
  #trips-drawer.open{left:0}
  .stat-lbl{font-size:8px}
  .stat-num{font-size:13px}
}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:1.25rem">
      <img src="https://bill04040.github.io/Datascan_LTI_Logo_Round_Dark.png"
        style="width:72px;height:72px;border-radius:50%;object-fit:cover" alt="Datascan"/>
    </div>
    <div class="login-logo-title">Datascan</div>
    <div class="login-logo-sub">Travel Manager · Sign in to continue</div>
    <label class="login-label">Email address</label>
    <input class="login-input" type="email" id="login-email" placeholder="you@datascan.com" autocomplete="email"/>
    <label class="login-label">Password</label>
    <input class="login-input" type="password" id="login-password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <i class="ti ti-login"></i> Sign in
    </button>
    <div class="login-err" id="login-err"></div>
    <div id="login-version" style="text-align:center;margin-top:.75rem;font-size:11px;color:rgba(232,240,248,.25);letter-spacing:.04em"></div>
  </div>
</div>

<!-- App -->
<div id="app">

  <!-- Filter bar -->
  <div id="topbar">
    <span class="tb-brand">Datascan</span>
    <span class="tb-sub">Travel Manager</span>
    <div class="tb-sep"></div>
    <span class="tb-label">Date</span>
    <input type="date" id="filter-date" class="filter-input" onchange="onDateChange()"/>
    <div class="tb-sep"></div>
    <span class="tb-label">Vehicle</span>
    <select id="filter-vehicle" class="filter-input" onchange="applyFilters()">
      <option value="">All</option>
    </select>
    <span class="tb-label">Leg</span>
    <select id="filter-leg" class="filter-input" onchange="applyFilters()">
      <option value="">All</option>
      <option value="outbound">Outbound</option>
      <option value="return">Return</option>
      <option value="job_to_job">Job to Job</option>
    </select>
    <span class="tb-label">Status</span>
    <select id="filter-status" class="filter-input" onchange="applyFilters()">
      <option value="">All</option>
      <option value="active">Active</option>
      <option value="completed">Completed</option>
      <option value="setup">Boarding</option>
    </select>
    <span class="tb-user" id="tb-user">—</span>
    <button class="tb-btn" onclick="doLogout()"><i class="ti ti-logout"></i> Sign out</button>
  </div>

  <!-- Stats strip -->
  <div id="stats-bar">
    <div class="stat-cell"><div class="stat-num" id="st-total">—</div><div class="stat-lbl">Trips</div></div>
    <div class="stat-cell"><div class="stat-num blue" id="st-active">—</div><div class="stat-lbl">Active</div></div>
    <div class="stat-cell"><div class="stat-num green" id="st-ontime">—</div><div class="stat-lbl">On Time</div></div>
    <div class="stat-cell"><div class="stat-num amber" id="st-late">—</div><div class="stat-lbl">A Little Late</div></div>
    <div class="stat-cell"><div class="stat-num red" id="st-reallylate">—</div><div class="stat-lbl">Really Late</div></div>
    <div class="stat-cell"><div class="stat-num" id="st-drivers">—</div><div class="stat-lbl">Drivers</div></div>
    <div id="live-badge"><i class="ti ti-radar" style="font-size:12px"></i> Live</div>
  </div>

  <!-- Main map area -->
  <div id="main">

    <!-- Fleet map -->
    <div id="fleet-map"></div>

    <!-- Refresh indicator -->
    <div id="refresh-ring">
      <i class="ti ti-refresh" style="font-size:11px"></i>
      <span id="refresh-label">Refreshing…</span>
    </div>

    <!-- Multi-trip color legend -->
    <div id="trip-color-legend"></div>

    <!-- Trips FAB — sits next to zoom controls bottom-left -->
    <button id="trips-fab" onclick="toggleDrawer()">
      <i class="ti ti-list" style="font-size:14px"></i>
      Trips <span class="fab-badge" id="fab-badge">0</span>
    </button>

    <!-- Map legend — bottom right -->
    <div id="map-legend">
      <div class="legend-row"><div class="legend-dot" style="background:#6AB34F"></div> On time</div>
      <div class="legend-row"><div class="legend-dot" style="background:#F4A93A"></div> A little late</div>
      <div class="legend-row"><div class="legend-dot" style="background:#f87171"></div> Really late</div>
      <div class="legend-row"><div class="legend-dot" style="background:#7eb8f7"></div> Boarding</div>
      <div class="legend-row"><div class="legend-dot" style="background:#888780"></div> Completed</div>
    </div>

    <!-- Trips drawer -->
    <div id="trips-drawer">
      <div class="drawer-header">
        <div class="drawer-title">
          <i class="ti ti-list" style="font-size:16px;color:var(--text3)"></i>
          Trips
          <span class="fab-badge" id="drawer-count">0</span>
        </div>
        <button class="drawer-close" onclick="toggleDrawer()"><i class="ti ti-x"></i></button>
      </div>
      <div class="drawer-search">
        <input type="search" id="drawer-search" placeholder="Search driver, customer…"
          oninput="renderDrawer(this.value)"/>
      </div>
      <div class="drawer-actions">
        <button class="drawer-btn dbtn-primary" onclick="viewSelectedOnMap()">
          <i class="ti ti-map-pin"></i> View on map
        </button>
        <button class="drawer-btn dbtn-secondary" onclick="clearSelections()">
          <i class="ti ti-x"></i> Clear
        </button>
        <button class="drawer-btn dbtn-secondary" onclick="toggleDrawer()">
          <i class="ti ti-arrow-left"></i> Back
        </button>
      </div>
      <div class="drawer-body" id="drawer-body">
        <div style="padding:2rem;text-align:center;color:var(--text3);font-size:12px">Loading…</div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script>
// ── Trip palette for multi-trip view ──────────────────────────────────────
const TRIP_PALETTE = [
  '#4A9EFF','#FF7B4A','#A855F7','#22D3EE','#F59E0B',
  '#EC4899','#34D399','#F97316','#818CF8','#10B981'
];

// ════════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════════
let _sb = null;
let currentUser = null, currentProfile = null, _userPermissions = {};
let _allLogs = [], _filtered = [], _selected = new Set();
let _sortCol = 'started_at', _sortAsc = false;
let _fleetMap = null, _fleetMarkers = {};
let _overlayLayers = [];   // all layers added for route/ping overlays
let _autoTrailLayers = []; // planned route + ping trail + dest, auto-drawn for en-route trips
let _mapCard = null;
let _refreshTimer = null, _isToday = true, _lastRefresh = null;
let _drawerOpen = false;

// ── Boarding (onboarding) live state ────────────────────────────────────────
let _boardingGroups = [];       // pseudo-trips built from pending_board gps_pings
let _filteredBoarding = [];     // boarding groups after applying topbar filters
let _knownLocations = [];       // manager-tagged locations, e.g. hotels
let _locationHubs = [];         // clustered departure/arrival points across today's legs
let _profilesCache = {};        // driver_id -> full_name
let _boardingSub = null, _trackingSub = null;
let _realtimeDebounce = null;

// ════════════════════════════════════════════════════════════════════════════
// SUPABASE

// AUTH
// ════════════════════════════════════════════════════════════════════════════
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-err');
  err.textContent='';
  if(!email||!pass){err.textContent='Email and password required.';return;}
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> Signing in…';
  const {data,error}=await getSB().auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> Sign in';return;}
  await onSignedIn(data.user);
}

async function onSignedIn(user){
  currentUser=user;
  const {data:profile}=await getSB().from('profiles').select('*').eq('id',user.id).maybeSingle();
  currentProfile=profile||{full_name:user.email,role:'unknown'};
  const {data:roleDef}=await getSB().from('role_definitions')
    .select('permissions,scope_type,role_label').eq('role_key',currentProfile?.role||'supervisor').maybeSingle();
  const rp=roleDef?.permissions||{}, ov=currentProfile?.permissions_override||{}, eff={};
  Object.entries(ov).forEach(([k,v])=>{if(k==='qa_config')eff[k]=v;else if(v===true)eff[k]=true;});
  _userPermissions={...rp,...eff};
  if(!_userPermissions['app_travel_mgr']){
    await getSB().auth.signOut();
    document.getElementById('login-err').textContent='Access denied — your role does not have Travel Manager access.';
    document.getElementById('login-btn').disabled=false;
    document.getElementById('login-btn').innerHTML='<i class="ti ti-login"></i> Sign in';
    return;
  }
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-user').textContent=currentProfile.full_name||user.email;
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('filter-date').value=today;
  _isToday=true;
  initFleetMap();
  await loadTrips();
  startAutoRefresh();
  subscribeRealtime();
}

async function doLogout(){
  stopAutoRefresh();
  unsubscribeRealtime();
  await getSB().auth.signOut();
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').style.display='none';
  currentUser=null;currentProfile=null;_allLogs=[];_filtered=[];_boardingGroups=[];
}

// ════════════════════════════════════════════════════════════════════════════
// REALTIME — onboarding (pending_board) and en-route tracking pings
// ════════════════════════════════════════════════════════════════════════════
function subscribeRealtime(){
  if(_boardingSub||_trackingSub) return;

  // Passengers boarding/un-boarding — reflect instantly, this is the
  // "who's getting in the vehicle right now" signal managers need live.
  _boardingSub = getSB().channel('mgr-pending-board-rt')
    .on('postgres_changes',
      {event:'*',schema:'public',table:'gps_pings',filter:'event_type=eq.pending_board'},
      async()=>{
        if(!_isToday) return;
        await loadBoardingGroups();
        applyFilters();
      })
    .subscribe();

  // Active trip tracking pings — debounced full refresh so the live route/
  // trail/ETA on the map stays current without waiting for the 60s poll.
  _trackingSub = getSB().channel('mgr-tracking-rt')
    .on('postgres_changes',
      {event:'INSERT',schema:'public',table:'gps_pings',filter:'event_type=eq.tracking'},
      ()=>{
        if(!_isToday) return;
        if(_realtimeDebounce) clearTimeout(_realtimeDebounce);
        _realtimeDebounce=setTimeout(()=>{ loadTrips(); },2000);
      })
    .subscribe();
}

function unsubscribeRealtime(){
  if(_boardingSub){ getSB().removeChannel(_boardingSub); _boardingSub=null; }
  if(_trackingSub){ getSB().removeChannel(_trackingSub); _trackingSub=null; }
  if(_realtimeDebounce){ clearTimeout(_realtimeDebounce); _realtimeDebounce=null; }
}

// ════════════════════════════════════════════════════════════════════════════
// LOAD DATA
// ════════════════════════════════════════════════════════════════════════════
async function loadTrips(){
  const dateVal=document.getElementById('filter-date').value;
  if(!dateVal) return;
  const fromISO=dateVal+'T00:00:00.000Z', toISO=dateVal+'T23:59:59.999Z';

  const {data:logs}=await getSB().from('travel_logs')
    .select(`id,timesheet_id,status,leg_type,vehicle_plate,
             miles_start,miles_end,started_at,completed_at,
             origin_lat,origin_lng,dest_lat,dest_lng,dest_address,
             driver_id,driver_name,planned_route,
             session_health,last_ping_at,deviation_status`)
    .gte('started_at',fromISO).lte('started_at',toISO)
    .order('started_at',{ascending:true});

  // Timesheets
  const tsIds=[...new Set((logs||[]).map(l=>l.timesheet_id).filter(Boolean))];
  let tsMap={};
  if(tsIds.length){
    const {data:tsList}=await getSB().from('timesheets')
      .select('id,client_name,store_number,city,state').in('id',tsIds);
    (tsList||[]).forEach(ts=>{tsMap[ts.id]=ts;});
  }

  // Passengers
  const logIds=(logs||[]).map(l=>l.id);
  let paxMap={};
  if(logIds.length){
    const {data:paxList}=await getSB().from('travel_passengers')
      .select('travel_log_id,full_name').in('travel_log_id',logIds);
    (paxList||[]).forEach(p=>{
      if(!paxMap[p.travel_log_id]) paxMap[p.travel_log_id]=[];
      paxMap[p.travel_log_id].push(p);
    });
  }

  // Last ping per log
  let pingMap={};
  if(logIds.length){
    await Promise.all(logIds.map(async id=>{
      const {data:lp}=await getSB().from('gps_pings')
        .select('lat,lng,speed,recorded_at,ping_health,deviation_m,trip_status,geofence_hit')
        .eq('travel_log_id',id).order('recorded_at',{ascending:false}).limit(1).maybeSingle();
      if(lp) pingMap[id]=lp;
    }));
  }

  _allLogs=(logs||[]).map(l=>({...l,_ts:tsMap[l.timesheet_id]||{},_pax:paxMap[l.id]||[],_lastPing:pingMap[l.id]||null}));

  // Full ping-trail history for active (en route) legs, batched in one query,
  // so the manager map can draw where each vehicle has been, not just where
  // it is right now.
  const activeIds=_allLogs.filter(l=>l.status==='active').map(l=>l.id);
  let trailMap={};
  if(activeIds.length){
    const {data:trailPings}=await getSB().from('gps_pings')
      .select('travel_log_id,lat,lng,speed,recorded_at,ping_health,deviation_m,is_moving')
      .in('travel_log_id',activeIds)
      .eq('trip_status','active')
      .order('recorded_at',{ascending:true})
      .limit(3000);
    (trailPings||[]).forEach(p=>{
      if(!trailMap[p.travel_log_id]) trailMap[p.travel_log_id]=[];
      trailMap[p.travel_log_id].push(p);
    });
  }
  _allLogs=_allLogs.map(l=>({...l,_trail:trailMap[l.id]||[]}));

  // Stop events (fuel/rest/meal/traffic/other, self-reported by the driver)
  // for active legs, batched in one query, so the live map can render them
  // alongside the trail without a per-leg round trip.
  let stopMap={};
  if(activeIds.length){
    const {data:stopRows}=await getSB().from('travel_stop_events')
      .select('id,travel_log_id,lat,lng,started_at,duration_secs,is_confirmed,stop_type')
      .in('travel_log_id',activeIds)
      .eq('is_confirmed',true);
    (stopRows||[]).forEach(s=>{
      if(!stopMap[s.travel_log_id]) stopMap[s.travel_log_id]=[];
      stopMap[s.travel_log_id].push(s);
    });
  }
  _allLogs=_allLogs.map(l=>({...l,_stops:stopMap[l.id]||[]}));

  // Manager-tagged known locations (currently just "hotel") — optional table;
  // fail open (empty) if it doesn't exist yet rather than breaking the map.
  try{
    const {data:known}=await getSB().from('known_locations').select('lat,lng,location_type');
    _knownLocations=known||[];
  }catch(e){ _knownLocations=[]; }

  // Passengers currently boarding a vehicle (no travel_log yet)
  if(_isToday) await loadBoardingGroups();
  else _boardingGroups=[];

  // Populate vehicle filter
  const vehicles=[...new Set(_allLogs.map(l=>l.vehicle_plate).filter(Boolean))].sort();
  const vSel=document.getElementById('filter-vehicle');
  const curV=vSel.value;
  vSel.innerHTML='<option value="">All</option>'+vehicles.map(v=>`<option value="${v}">${v}</option>`).join('');
  if(curV) vSel.value=curV;

  applyFilters();
  _lastRefresh=new Date();
  updateRefreshLabel();
}

// ════════════════════════════════════════════════════════════════════════════
// LOCATION HUBS — departure/arrival points clustered by coordinate
// ════════════════════════════════════════════════════════════════════════════
// Every leg contributes two boundary events: departs (origin) and arrives
// (destination). Job-to-job legs chain, so an internal boundary is always
// touched by two legs at once (leg N arrives where leg N+1 departs) — that's
// a "waypoint". The very first departure of the day and the very last
// arrival aren't tied to any job; when they land on the same coordinate
// (the common case — a loop returning to where it started) that's a "meet
// spot", carrying however many legs' departures/arrivals touch it.
//
// Two different signals decide whether two events are "the same stop":
//  - Sequential adjacency (leg N's arrival, leg N+1's departure) — this is
//    ALWAYS the same physical stop by construction, even though the two
//    events come from different coordinate sources that rarely match
//    exactly (leg N's destination is the store's geocoded address; leg
//    N+1's origin is the driver's live GPS reading when they tap "begin
//    next leg" — parking lot vs. storefront, plus ordinary GPS drift).
//    Adjacency is checked first and is authoritative.
//  - Coordinate proximity — the only signal available for the meet-spot
//    case, since the first departure and the last arrival aren't adjacent
//    legs (there's a whole loop between them).
const HUB_TOLERANCE_DEG = 0.00025; // ~25-28m — meet-spot GPS drift only
const HEALTH_SEVERITY = {'#f87171':3,'#F4A93A':2,'#6AB34F':1,'#7eb8f7':0,'#888780':0};

function _hubGridKey(lat,lng){
  return Math.round(lat/HUB_TOLERANCE_DEG)+':'+Math.round(lng/HUB_TOLERANCE_DEG);
}

function buildLocationHubs(logs){
  const byVehicle={};
  logs.forEach(l=>{
    if(!l.vehicle_plate) return;
    (byVehicle[l.vehicle_plate]=byVehicle[l.vehicle_plate]||[]).push(l);
  });

  const hubs={};       // hub id -> hub object
  const hubIndex={};   // "plate::gridKey" -> hub id, for coordinate lookups

  const getOrCreateHub=(plate,lat,lng)=>{
    lat=parseFloat(lat); lng=parseFloat(lng);
    if(!lat||!lng||isNaN(lat)||isNaN(lng)) return null;
    const key=plate+'::'+_hubGridKey(lat,lng);
    if(!hubIndex[key]){
      const id='hub:'+key;
      hubs[id]={id, vehicle_plate:plate, lat, lng, events:[]};
      hubIndex[key]=id;
    }
    return hubIndex[key];
  };

  Object.entries(byVehicle).forEach(([plate,vehLogs])=>{
    const sorted=vehLogs.slice().sort((a,b)=>new Date(a.started_at||0)-new Date(b.started_at||0));

    // Carries the previous leg's arrival hub id forward, so a chained leg's
    // departure lands in the SAME hub regardless of GPS offset.
    let prevArrivalHubId=null;

    // Carries the day's meet-spot hub id forward from the first outbound
    // departure to the eventual return arrival. Same reasoning as the
    // job-to-job chain above: "return leg ends where the outbound leg
    // started" is a structural fact of how the app builds a return leg
    // (not just two GPS readings that happen to be nearby), so it should
    // merge the same way — not depend on distance at all. Resets once
    // consumed, so a later unrelated outbound leg on the same vehicle
    // starts its own new meet-spot hub rather than reusing a stale one.
    let meetHubId=null;

    sorted.forEach((log,idx)=>{
      const legNum=idx+1;
      const legType=log.leg_type||'outbound';
      const isMeetDepart=legType==='outbound';
      const isMeetArrive=legType==='return';

      if(log.origin_lat&&log.origin_lng){
        let hid;
        if(isMeetDepart){
          hid = meetHubId || getOrCreateHub(plate,log.origin_lat,log.origin_lng);
          meetHubId = hid;
        } else if(prevArrivalHubId){
          hid = prevArrivalHubId;
        } else {
          hid = getOrCreateHub(plate,log.origin_lat,log.origin_lng);
        }
        if(hid) hubs[hid].events.push({role:'departs', legNum, log, isMeet:isMeetDepart});
      }

      prevArrivalHubId=null;
      if(log.dest_lat&&log.dest_lng){
        const hid = (isMeetArrive && meetHubId) ? meetHubId : getOrCreateHub(plate,log.dest_lat,log.dest_lng);
        if(hid){
          hubs[hid].events.push({role:'arrives', legNum, log, isMeet:isMeetArrive});
          prevArrivalHubId=hid;
        }
        if(isMeetArrive) meetHubId=null; // consumed — a later outbound leg gets a fresh hub
      }
    });
  });

  return Object.values(hubs).map(h=>{
    h.type=classifyHub(h);
    h.color=hubBadgeColor(h.events);
    h.hotel=isHotelLocation(h.lat,h.lng);
    h.events.sort((a,b)=>a.legNum-b.legNum); // departs (lowest legNum) first, arrives last
    return h;
  });
}

// meetspot        — dual role, split badge, no chip (steering-wheel chip only
//                    when it's a single-role meet spot with no return pairing)
// meetspot-single — one-off departure/arrival with no job tie
// waypoint        — internal job-to-job boundary, likely a passenger swap
// job             — a single-role job-site endpoint
function classifyHub(hub){
  const anyMeet=hub.events.some(e=>e.isMeet);
  if(anyMeet) return hub.events.length>1 ? 'meetspot' : 'meetspot-single';
  return hub.events.length>1 ? 'waypoint' : 'job';
}

function hubBadgeColor(events){
  let worst=null, worstScore=-1;
  events.forEach(e=>{
    const c=dotColor(e.log);
    const score=HEALTH_SEVERITY[c]??0;
    if(score>worstScore){ worstScore=score; worst=c; }
  });
  return worst||'#888780';
}

function isHotelLocation(lat,lng){
  return _knownLocations.some(k=>
    k.location_type==='hotel' &&
    Math.abs(parseFloat(k.lat)-lat) < HUB_TOLERANCE_DEG*1.5 &&
    Math.abs(parseFloat(k.lng)-lng) < HUB_TOLERANCE_DEG*1.5
  );
}

// ── Onboarding: passengers boarding, before a travel_logs row exists ───────
// Drivers write one gps_pings row per boarded passenger (event_type =
// 'pending_board', travel_log_id null). We group those by vehicle+job into
// lightweight pseudo-trips so the map/drawer can show boarding activity in
// real time, before the trip officially starts.
async function loadBoardingGroups(){
  const {data:pings}=await getSB().from('gps_pings')
    .select('id,driver_id,timesheet_id,vehicle_plate,profile_id,passenger_name,lat,lng,recorded_at')
    .eq('event_type','pending_board')
    .order('recorded_at',{ascending:true});

  if(!pings||!pings.length){ _boardingGroups=[]; return; }

  // Resolve driver names — prefer what we already have from today's trips
  // (driver_name is denormalized on travel_logs) to avoid a profiles query
  // that may be blocked by row-level security for other users.
  const unresolved=[...new Set(pings.map(p=>p.driver_id).filter(Boolean))]
    .filter(id=>{
      if(_profilesCache[id]) return false;
      const match=_allLogs.find(l=>l.driver_id===id && l.driver_name);
      if(match){ _profilesCache[id]=match.driver_name; return false; }
      return true;
    });
  if(unresolved.length){
    try{
      const {data:profs}=await getSB().from('profiles').select('id,full_name').in('id',unresolved);
      (profs||[]).forEach(p=>{ _profilesCache[p.id]=p.full_name; });
    }catch(e){ /* RLS may block cross-user lookups — fall back to a generic label */ }
  }

  // Resolve job names for boarding groups that don't overlap today's _ts map
  const tsIds=[...new Set(pings.map(p=>p.timesheet_id).filter(Boolean))];
  let tsMap={};
  tsIds.forEach(id=>{ const l=_allLogs.find(x=>x.timesheet_id===id); if(l) tsMap[id]=l._ts; });
  const missingTs=tsIds.filter(id=>!tsMap[id]);
  if(missingTs.length){
    const {data:tsList}=await getSB().from('timesheets')
      .select('id,client_name,store_number,city,state').in('id',missingTs);
    (tsList||[]).forEach(t=>{ tsMap[t.id]=t; });
  }

  const groups={};
  pings.forEach(p=>{
    const key=(p.timesheet_id||'x')+'::'+(p.vehicle_plate||'x');
    if(!groups[key]){
      groups[key]={
        id:'board:'+key,
        _isBoarding:true,
        status:'setup',
        leg_type:'outbound',
        vehicle_plate:p.vehicle_plate,
        driver_id:p.driver_id,
        driver_name:_profilesCache[p.driver_id]||'Driver',
        timesheet_id:p.timesheet_id,
        _ts:tsMap[p.timesheet_id]||{},
        _pax:[],
        origin_lat:p.lat, origin_lng:p.lng,
        started_at:p.recorded_at,
        _lastPing:null, _trail:[],
        planned_route:null,
      };
    }
    const g=groups[key];
    g.origin_lat=p.lat; g.origin_lng=p.lng; // pings arrive in ascending order — latest wins
    g._pax.push({full_name:p.passenger_name||'Passenger', profile_id:p.profile_id});
  });

  _boardingGroups=Object.values(groups);
}

function applyFilters(){
  const v=document.getElementById('filter-vehicle').value;
  const leg=document.getElementById('filter-leg').value;
  const st=document.getElementById('filter-status').value;

  _filtered=_allLogs.filter(l=>{
    if(v&&l.vehicle_plate!==v) return false;
    if(leg&&l.leg_type!==leg) return false;
    if(st){
      if(st==='active'&&l.status!=='active') return false;
      if(st==='completed'&&l.status!=='completed') return false;
      if(st==='setup'&&l.status!=='setup') return false;
    }
    return true;
  });

  _filteredBoarding=_boardingGroups.filter(g=>{
    if(v&&g.vehicle_plate!==v) return false;
    if(st&&st!=='setup') return false; // boarding groups only match the "Boarding" status filter
    return true;
  });

  // Hubs are built from every leg touching a vehicle today (not just the
  // status-filtered subset) so a meet spot still shows its full departs/
  // arrives pairing even if, say, only "En Route" is checked — then filtered
  // down to the vehicles currently in view.
  _locationHubs=buildLocationHubs(_allLogs).filter(h=>!v||h.vehicle_plate===v);

  renderStats();
  renderFleetMarkers();
  renderDrawer();
  document.getElementById('fab-badge').textContent=_filtered.length+_filteredBoarding.length;
  document.getElementById('drawer-count').textContent=_filtered.length+_filteredBoarding.length;
}

// ════════════════════════════════════════════════════════════════════════════
// HEALTH
// ════════════════════════════════════════════════════════════════════════════
function calcTripHealth(log){
  if(log._lastPing?.ping_health) return log._lastPing.ping_health;
  if(!log.started_at||!log.planned_route?.duration_seconds) return 'gray';
  const expectedMs=new Date(log.started_at).getTime()+log.planned_route.duration_seconds*1000;
  const compareMs=log.completed_at?new Date(log.completed_at).getTime():Date.now();
  const lateSecs=(compareMs-expectedMs)/1000;
  if(lateSecs>=15*60) return 'red';
  if(lateSecs>=1*60)  return 'amber';
  return 'green';
}

function tripStatusLabel(log){
  if(log.status==='setup') return 'Boarding';
  if(log.status==='completed') return 'Destinated';
  if(log._lastPing?.geofence_hit) return 'Destinated';
  return 'En Route';
}

function healthLabel(h){
  return {red:'Really late',amber:'A little late',green:'On time',gray:'—'}[h]||'—';
}

function ragClass(h){
  return {red:'rag-red',amber:'rag-amber',green:'rag-green',gray:'rag-gray',blue:'rag-blue'}[h]||'rag-gray';
}

function dotColor(log){
  const s=tripStatusLabel(log);
  if(s==='Boarding')   return '#7eb8f7';
  if(s==='Destinated') return '#888780';
  const h=calcTripHealth(log);
  return {red:'#f87171',amber:'#F4A93A',green:'#6AB34F'}[h]||'#6AB34F';
}

// ════════════════════════════════════════════════════════════════════════════
// STATS
// ════════════════════════════════════════════════════════════════════════════
function renderStats(){
  const f=_filtered;
  const active=f.filter(l=>l.status==='active').length;
  const drivers=[...new Set(f.map(l=>l.driver_id).filter(Boolean))].length;
  let on=0,al=0,rl=0;
  f.filter(l=>l.status!=='setup').forEach(l=>{
    const h=calcTripHealth(l);
    if(h==='green')on++;else if(h==='amber')al++;else if(h==='red')rl++;
  });
  document.getElementById('st-total').textContent=f.length;
  document.getElementById('st-active').textContent=active;
  document.getElementById('st-ontime').textContent=on;
  document.getElementById('st-late').textContent=al;
  document.getElementById('st-reallylate').textContent=rl;
  document.getElementById('st-drivers').textContent=drivers;
}

// ════════════════════════════════════════════════════════════════════════════
// FLEET MAP
// ════════════════════════════════════════════════════════════════════════════
function initFleetMap(){
  if(_fleetMap) return;
  const mapEl=document.getElementById('fleet-map');
  if(!mapEl) return;
  _fleetMap=L.map(mapEl,{zoomControl:true,attributionControl:false}).setView([37,-95.7],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(_fleetMap);
  _fleetMap.on('click',()=>closeMapCard());
}

function renderFleetMarkers(){
  if(!_fleetMap) return;
  Object.values(_fleetMarkers).forEach(m=>m.remove());
  _fleetMarkers={};
  _autoTrailLayers.forEach(l=>{try{l.remove?l.remove():_fleetMap.removeControl(l);}catch(e){}});
  _autoTrailLayers=[];

  // Live position — only for legs actually en route right now. A completed
  // leg's "last known position" is already covered by its arrival hub badge,
  // so drawing both would just stack a plain dot on top of a numbered one.
  _filtered.filter(l=>l.status==='active').forEach(log=>{
    const ping=log._lastPing;
    const lat=parseFloat(ping?.lat||log.origin_lat);
    const lng=parseFloat(ping?.lng||log.origin_lng);
    if(!lat||!lng||isNaN(lat)||isNaN(lng)) return;

    const color=dotColor(log);
    const icon=L.divIcon({
      html:`<div style="
        width:18px;height:18px;border-radius:50%;
        background:${color};
        border:3px solid rgba(255,255,255,.9);
        box-shadow:0 0 0 4px ${color}35, 0 2px 8px rgba(0,0,0,.6);
        cursor:pointer;transition:transform .1s"
        onmouseenter="this.style.transform='scale(1.3)'"
        onmouseleave="this.style.transform='scale(1)'">
      </div>`,
      className:'',iconAnchor:[9,9]
    });

    const m=L.marker([lat,lng],{icon,zIndexOffset:500}).addTo(_fleetMap);
    m.on('click',e=>{L.DomEvent.stopPropagation(e);showMapCard(log,lat,lng,e);});
    _fleetMarkers['live:'+log.id]=m;

    if(tripStatusLabel(log)==='En Route') drawAutoTrail(log);
  });

  // Structural waypoints — every departure/arrival point touched today,
  // clustered into hubs and numbered by sequence. Covers start, destination,
  // and everywhere in between, whether the leg is still active or already
  // completed.
  renderLocationHubs();

  // Boarding pseudo-markers — passengers currently getting into a vehicle
  _filteredBoarding.forEach(g=>{
    const lat=parseFloat(g.origin_lat), lng=parseFloat(g.origin_lng);
    if(!lat||!lng||isNaN(lat)||isNaN(lng)) return;
    const color='#7eb8f7';
    const icon=L.divIcon({
      html:`<div style="
        width:18px;height:18px;border-radius:50%;background:${color};
        border:3px solid rgba(255,255,255,.9);
        box-shadow:0 0 0 4px ${color}35,0 2px 8px rgba(0,0,0,.6);
        cursor:pointer;transition:transform .1s"
        onmouseenter="this.style.transform='scale(1.3)'"
        onmouseleave="this.style.transform='scale(1)'">
      </div>`,
      className:'',iconAnchor:[9,9]
    });
    const m=L.marker([lat,lng],{icon,zIndexOffset:500}).addTo(_fleetMap);
    m.on('click',e=>{L.DomEvent.stopPropagation(e);showMapCard(g,lat,lng,e);});
    _fleetMarkers[g.id]=m;
  });

  if(!_mapCard){
    const pts=Object.values(_fleetMarkers).map(m=>m.getLatLng());
    if(pts.length>1) _fleetMap.fitBounds(L.latLngBounds(pts),{padding:[60,60]});
    else if(pts.length===1) _fleetMap.setView(pts[0],12);
  }
}

// ── Location hubs — numbered departure/arrival badges ───────────────────────
const HUB_CIRCLE=44, HUB_CHIP=24, HUB_BOX=56, HUB_OFFSET=12;

function hubChipIcon(hub){
  if(hub.hotel) return 'ti-bed';
  if(hub.type==='job') return 'ti-building-store';
  if(hub.type==='waypoint') return 'ti-users';
  if(hub.type==='meetspot'||hub.type==='meetspot-single') return 'ti-steering-wheel';
  return null;
}

function hubMarkerHTML(hub){
  // Same single-circle pattern as every other pin — one badge, joined leg
  // numbers in the order they occurred (depart's number first, arrive's
  // second), a chip identifying what kind of place it is. A meet spot isn't
  // a different shape, just a different chip.
  const label = (hub.type==='waypoint'||hub.type==='meetspot')
    ? [...new Set(hub.events.map(e=>e.legNum))].join('\u00B7')
    : String(hub.events[0]?.legNum ?? '');
  const chipIcon=hubChipIcon(hub);
  const chip=chipIcon?`<div style="position:absolute;left:0;top:0;width:${HUB_CHIP}px;height:${HUB_CHIP}px;
    border-radius:50%;background:#5F5E5A;border:2px solid #0b1929;display:flex;align-items:center;
    justify-content:center;z-index:2"><i class="ti ${chipIcon}" style="font-size:13px;color:#fff"></i></div>`:'';
  return `<div style="position:relative;width:${HUB_BOX}px;height:${HUB_BOX}px;cursor:pointer">
    <div style="position:absolute;left:${HUB_OFFSET}px;top:${HUB_OFFSET}px;width:${HUB_CIRCLE}px;height:${HUB_CIRCLE}px;
      border-radius:50%;background:${hub.color};border:3.5px solid rgba(255,255,255,.9);color:#fff;
      font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;
      box-shadow:0 2px 8px rgba(0,0,0,.6)">${label}</div>
    ${chip}
  </div>`;
}

function renderLocationHubs(){
  _locationHubs.forEach(hub=>{
    const icon=L.divIcon({
      html:hubMarkerHTML(hub), className:'',
      iconSize:[HUB_BOX,HUB_BOX],
      iconAnchor:[HUB_OFFSET+HUB_CIRCLE/2, HUB_OFFSET+HUB_CIRCLE/2],
    });
    const m=L.marker([hub.lat,hub.lng],{icon,zIndexOffset:400}).addTo(_fleetMap);
    m.on('click',e=>{L.DomEvent.stopPropagation(e);showHubCard(hub,e);});
    _fleetMarkers[hub.id]=m;
  });
}

function showHubCard(hub,e){
  // A hub touched by exactly one leg is really just that leg's endpoint —
  // no need for an intermediate list, go straight to its own card.
  if(hub.events.length===1){
    showMapCard(hub.events[0].log, hub.lat, hub.lng, e, hub.events[0].role);
    return;
  }

  closeMapCard();
  const el=document.createElement('div');
  el.className='map-card';
  el.id='active-map-card';
  el.innerHTML=`
    <button class="map-card-close" onclick="closeMapCard()">×</button>
    <div class="map-card-name">${hub.type==='meetspot'?'Meet spot':'Waypoint'}${hub.hotel?' · Hotel':''}</div>
    <div class="map-card-job">${hub.vehicle_plate||''}</div>
    <div class="map-card-divider"></div>
    <div id="hub-card-rows"></div>`;

  const rowsEl=el.querySelector('#hub-card-rows');
  hub.events.forEach(ev=>{
    const roleColor=ev.role==='departs'?'#1E5FAE':'#F4A93A';
    const roleIcon=ev.role==='departs'?'ti-arrow-up-right':'ti-arrow-down-left';
    const roleLabel=ev.role==='departs'?'Departs':'Arrives';
    const t=ev.role==='departs'?ev.log.started_at:ev.log.completed_at;
    const row=document.createElement('div');
    row.className='hub-card-row';
    row.innerHTML=`
      <div class="hub-card-num" style="background:${roleColor}">${ev.legNum}</div>
      <i class="ti ${roleIcon}" style="font-size:12px;color:${roleColor}"></i>
      <span class="hub-card-role">${roleLabel}${t?' '+fmtTime(t):''}</span>
      <i class="ti ti-chevron-right" style="font-size:12px;color:rgba(232,240,248,.35);margin-left:auto"></i>`;
    row.addEventListener('click',()=>{ showMapCard(ev.log, hub.lat, hub.lng, e, ev.role); });
    rowsEl.appendChild(row);
  });

  positionMapCard(el,e);
  document.getElementById('main').appendChild(el);
  _mapCard=el;
}

function stopTypeMetaMgr(t){
  return {
    fuel:   {label:'Fuel',    icon:'ti-gas-station'},
    rest:   {label:'Rest',    icon:'ti-coffee'},
    meal:   {label:'Meal',    icon:'ti-tools-kitchen-2'},
    traffic:{label:'Traffic', icon:'ti-car'},
    other:  {label:'Other',   icon:'ti-dots'},
  }[t] || {label:'Untagged', icon:'ti-help'};
}

// ── Auto route + trail + destination, drawn live for en-route trips ────────
function drawAutoTrail(log){
  const trail=(log._trail||[]).filter(p=>p.lat&&p.lng);
  const coords=trail.map(p=>[parseFloat(p.lat),parseFloat(p.lng)]);
  const ragColors={green:'#6AB34F',amber:'#F4A93A',red:'#f87171'};

  // Planned route — thin dashed line so it reads as "the plan" behind the
  // actual trail, and doesn't overwhelm the map when several vehicles show.
  const pr=log.planned_route;
  if(pr?.polyline){
    const pc=decodePolyline(pr.polyline);
    if(pc.length>1){
      const pl=L.polyline(pc,{color:'#1E5FAE',weight:3,opacity:.45,dashArray:'6 6'}).addTo(_fleetMap);
      _autoTrailLayers.push(pl);
    }
  }

  // Ping-by-ping trail line, segment-colored by health at that point in time.
  if(coords.length>1){
    for(let i=1;i<coords.length;i++){
      const col=ragColors[trail[i].ping_health]||'rgba(255,255,255,.4)';
      const ln=L.polyline([coords[i-1],coords[i]],{color:col,weight:3,opacity:.85}).addTo(_fleetMap);
      _autoTrailLayers.push(ln);
    }

    // GPS ping breadcrumbs — thinned so a long leg doesn't turn into a wall
    // of dots, but always includes the very first and last ping.
    const maxDots=14;
    const step=Math.max(1,Math.ceil(coords.length/maxDots));
    const indices=new Set();
    for(let i=0;i<coords.length;i+=step) indices.add(i);
    indices.add(coords.length-1);
    [...indices].sort((a,b)=>a-b).forEach(i=>{
      const p=trail[i];
      const col=ragColors[p.ping_health]||'rgba(255,255,255,.5)';
      const dotIcon=L.divIcon({
        html:`<div style="width:9px;height:9px;border-radius:50%;background:${col};
          border:1.5px solid rgba(255,255,255,.8);cursor:pointer"></div>`,
        className:'',iconAnchor:[5,5]
      });
      const dm=L.marker(coords[i],{icon:dotIcon,zIndexOffset:300}).addTo(_fleetMap);
      const spdTxt=p.speed!=null?Math.round(p.speed*2.237)+' mph':'—';
      const devTxt=p.deviation_m!=null?Math.round(p.deviation_m)+'m from route':'No deviation data';
      dm.bindPopup(`<div style="font:12px Arial;color:#0b1929"><strong>${fmtTime(p.recorded_at)}</strong><br/>${spdTxt} · ${devTxt}</div>`);
      _autoTrailLayers.push(dm);
    });
  }

  // Stop pills — fuel/rest/meal/traffic/other, self-reported by the driver.
  // Deliberately unnumbered: these aren't planned trip structure, just
  // things that happened along the way.
  (log._stops||[]).forEach(s=>{
    const slat=parseFloat(s.lat), slng=parseFloat(s.lng);
    if(!slat||!slng||isNaN(slat)||isNaN(slng)) return;
    const meta=stopTypeMetaMgr(s.stop_type);
    const pillIcon=L.divIcon({
      html:`<div style="width:36px;height:36px;border-radius:50%;background:#a855f7;
        border:3px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;
        box-shadow:0 2px 6px rgba(0,0,0,.5);cursor:pointer">
        <i class="ti ${meta.icon}" style="font-size:17px;color:#fff"></i>
      </div>`,
      className:'',iconAnchor:[18,18]
    });
    const sm=L.marker([slat,slng],{icon:pillIcon,zIndexOffset:450}).addTo(_fleetMap);
    const mins=s.duration_secs?Math.round(s.duration_secs/60):null;
    sm.bindPopup(`<div style="font:12px Arial;color:#0b1929"><strong>${meta.label}</strong><br/>${fmtTime(s.started_at)}${mins?' · '+mins+' min':''}</div>`);
    _autoTrailLayers.push(sm);
  });
}

// ── Map card ──────────────────────────────────────────────────────────────
function showMapCard(log,lat,lng,e,role){
  closeMapCard();

  if(log._isBoarding){ showBoardingCard(log,lat,lng,e); return; }

  const s=tripStatusLabel(log), h=calcTripHealth(log), ts=log._ts||{};
  const pax=log._pax||[];
  const paxNames=pax.map(p=>p.full_name).filter(Boolean).join(', ')||'—';
  const spClass={Boarding:'sp-boarding','En Route':'sp-enroute',Destinated:'sp-destinated'}[s]||'sp-enroute';
  const lastP=log._lastPing;

  // Live ETA: prefer distance-remaining ÷ current speed from the latest
  // ping (matches what the driver app itself estimates); fall back to the
  // planned route's static duration when live speed isn't available yet.
  let etaText='—';
  let distText='—';
  if(s==='En Route'&&lastP?.lat&&lastP?.lng&&log.dest_lat&&log.dest_lng){
    const distM=haversineMeters(parseFloat(lastP.lat),parseFloat(lastP.lng),parseFloat(log.dest_lat),parseFloat(log.dest_lng));
    distText=(distM/1609.34).toFixed(1)+' mi';
    const spdMs=lastP.speed&&lastP.speed>0.9?lastP.speed:5.6; // ~12.5mph fallback while crawling/stopped
    const etaMins=Math.round(distM/spdMs/60);
    etaText=etaMins<=1?'Arriving':etaMins+' min';
  } else if(log.started_at&&log.planned_route?.duration_seconds){
    const eta=new Date(new Date(log.started_at).getTime()+log.planned_route.duration_seconds*1000);
    etaText=fmtTime(eta.toISOString());
  }

  const speedText=lastP?.speed!=null?Math.round(lastP.speed*2.237)+' mph':(s==='En Route'?'—':null);

  // Origin/destination — always both, always addressed, regardless of which
  // hub row got you here. A leg's origin address isn't a column on
  // travel_logs, but it's always the SAME physical spot as the previous
  // leg's destination (that's exactly how hubs get merged), so borrow it
  // from there rather than falling back to a job name that can repeat
  // across two different addresses for the same client.
  const sameVeh=_allLogs.filter(l=>l.vehicle_plate===log.vehicle_plate)
    .sort((a,b)=>new Date(a.started_at||0)-new Date(b.started_at||0));
  const vIdx=sameVeh.findIndex(l=>l.id===log.id);
  const prevLeg=vIdx>0?sameVeh[vIdx-1]:null;
  const originLabel = log.leg_type==='outbound'
    ? 'Meet spot'
    : (prevLeg?.dest_address || prevLeg?._ts?.client_name || 'Previous stop');
  const destLabel = log.dest_address || ts.client_name || '—';
  const arrivedOrEta = s==='En Route' ? etaText : (log.completed_at?fmtTime(log.completed_at):'—');
  const arrivedOrEtaLbl = s==='En Route' ? 'ETA' : 'Arrived';

  const el=document.createElement('div');
  el.className='map-card';
  el.id='active-map-card';
  el.innerHTML=`
    <button class="map-card-close" onclick="closeMapCard()">×</button>
    <div style="margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span class="status-pill ${spClass}">${s}</span>
      ${role?`<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
        color:${role==='arrives'?'#F4A93A':'#85B7EB'}">${role==='arrives'?'· Arrival here':'· Departure from here'}</span>`:''}
    </div>
    <div class="map-card-name">${log.driver_name||'Driver'}</div>
    <div class="map-card-job">${ts.client_name||'—'}${ts.store_number?' · Store '+ts.store_number:''}${ts.city?' · '+ts.city:''}</div>
    <div class="map-card-divider"></div>
    <div class="map-card-row">
      <span class="map-card-lbl">Leg</span>
      <span class="map-card-val">${{outbound:'Outbound',return:'Return',job_to_job:'Job→Job'}[log.leg_type]||'—'}</span>
    </div>
    <div class="map-card-row">
      <span class="map-card-lbl">Vehicle</span>
      <span class="map-card-val">${log.vehicle_plate||'—'}</span>
    </div>
    <div class="map-card-divider"></div>
    <div class="map-card-row" style="align-items:flex-start">
      <span class="map-card-lbl">Origin</span>
      <span class="map-card-val" style="white-space:normal;max-width:150px">${originLabel}</span>
    </div>
    <div class="map-card-row" style="padding-left:12px">
      <span class="map-card-lbl" style="opacity:.65">&#8627; Departed</span>
      <span class="map-card-val">${log.started_at?fmtTime(log.started_at):'—'}</span>
    </div>
    <div class="map-card-row" style="align-items:flex-start;margin-top:4px">
      <span class="map-card-lbl">Destination</span>
      <span class="map-card-val" style="white-space:normal;max-width:150px">${destLabel}</span>
    </div>
    <div class="map-card-row" style="padding-left:12px">
      <span class="map-card-lbl" style="opacity:.65">&#8627; ${arrivedOrEtaLbl}</span>
      <span class="map-card-val">${arrivedOrEta}</span>
    </div>
    <div class="map-card-divider"></div>
    ${s==='En Route'?`
    <div class="map-card-row">
      <span class="map-card-lbl">Health</span>
      <span class="rag ${ragClass(h)}">${healthLabel(h)}</span>
    </div>
    <div class="map-card-row">
      <span class="map-card-lbl">Speed</span>
      <span class="map-card-val">${speedText}</span>
    </div>
    <div class="map-card-row">
      <span class="map-card-lbl">Distance left</span>
      <span class="map-card-val">${distText}</span>
    </div>`:''}
    ${s==='Destinated'?`
    <div class="map-card-row">
      <span class="map-card-lbl">Result</span>
      <span class="rag ${ragClass(h)}">${healthLabel(h)}</span>
    </div>`:''}
    <div class="map-card-row" style="align-items:flex-start">
      <span class="map-card-lbl">Passengers</span>
      <span class="map-card-val" style="white-space:normal;max-width:150px">${paxNames} <span style="color:var(--green)">(${pax.length})</span></span>
    </div>
    <button class="map-card-btn" onclick="viewRouteForward('${log.id}')">
      <i class="ti ti-route"></i> View route on map
    </button>
    ${(!log.planned_route && log.origin_lat && log.dest_lat) ? `
    <button class="map-card-btn" id="retry-route-${log.id}"
      style="margin-top:6px;background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:#c9a6f5"
      onclick="retryPlannedRouteMgr('${log.id}', this)"
      ${_routeRetriedIds.has(log.id)?'disabled':''}>
      <i class="ti ti-refresh"></i> ${_routeRetriedIds.has(log.id)?'Already retried this session':'No planned route — fetch it'}
    </button>`:''}`;

  positionMapCard(el,e);
  document.getElementById('main').appendChild(el);
  _mapCard=el;
}

function positionMapCard(el,e){
  const mapRect=document.getElementById('fleet-map').getBoundingClientRect();
  const cx=e.originalEvent.clientX-mapRect.left;
  const cy=e.originalEvent.clientY-mapRect.top;
  let left=cx+18, top=cy-30;
  if(left+250>mapRect.width) left=cx-258;
  if(top+320>mapRect.height) top=mapRect.height-330;
  if(top<10) top=10;
  el.style.left=left+'px';
  el.style.top=top+'px';
}

function closeMapCard(){
  if(_mapCard){_mapCard.remove();_mapCard=null;}
}

// ── View route FORWARD from a clicked dot ─────────────────────────────────
// The pin sits at a location. "View route on map" should always show the
// leg that DEPARTS from that location — matched by origin_lat/origin_lng.
// We find the leg for the same vehicle whose origin is nearest to the
// clicked pin's coordinates. That is the departing leg to draw.
async function viewRouteForward(logId){
  // Trust the leg id the open card was actually built from. This used to
  // re-search for "whichever leg's origin is closest to this pin" as a
  // fallback from before hubs existed — now that a hub pin is legitimately
  // shared by two different legs (one arriving, one departing), that search
  // always resolved to the departing leg, since its origin literally IS the
  // pin — silently overriding the arrival leg's own route every time.
  await viewSelectedOnMap([logId]);
}

// ── Route + ping overlay ──────────────────────────────────────────────────
function clearOverlays(){
  _overlayLayers.forEach(l=>{try{l.remove?l.remove():_fleetMap.removeControl(l);}catch(e){}});
  _overlayLayers=[];
  document.getElementById('trip-color-legend').classList.remove('show');
  document.getElementById('trip-color-legend').innerHTML='';
  document.getElementById('map-legend').style.display='';
}

async function viewSelectedOnMap(ids){
  clearOverlays();
  closeMapCard();
  const selectedIds = ids || [..._selected];
  if(!selectedIds.length) return;

  const multiMode = selectedIds.length > 1;
  let allBounds = null;

  // Build color map for multi-trip
  const colorMap = {};
  selectedIds.forEach((id,i)=>{ colorMap[id]=TRIP_PALETTE[i%TRIP_PALETTE.length]; });

  // Build legend for multi-trip
  if(multiMode){
    const legend=document.getElementById('trip-color-legend');
    legend.innerHTML='<div style="font-size:10px;font-weight:700;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">Trips</div>'+
      selectedIds.map(id=>{
        const log=_allLogs.find(l=>l.id===id);
        if(!log) return '';
        const name=(log.driver_name||'Driver').split(' ')[0];
        const leg={outbound:'Out',return:'Ret',job_to_job:'J→J'}[log.leg_type]||'';
        return `<div class="tcl-row">
          <div class="tcl-line" style="background:${colorMap[id]}"></div>
          <span class="tcl-label">${name} · ${leg}</span>
        </div>`;
      }).join('');
    legend.classList.add('show');
    // Hide the status dot legend while trip legend is visible
    document.getElementById('map-legend').style.display='none';
    // Position trip legend at bottom-right (map-legend is hidden, so take its spot)
    legend.style.bottom='10px';
    legend.style.right='10px';
  }

  // Draw each trip
  for(const [idx, logId] of selectedIds.entries()){
    const log=_allLogs.find(l=>l.id===logId);
    if(!log) continue;

    const tripColor=colorMap[logId];

    const {data:pings}=await getSB().from('gps_pings')
      .select('lat,lng,recorded_at,ping_health,deviation_m,speed,is_moving')
      .eq('travel_log_id',logId)
      .eq('trip_status','active')
      .order('recorded_at',{ascending:true})
      .limit(500);

    const {data:stops}=await getSB().from('travel_stop_events')
      .select('*').eq('travel_log_id',logId).eq('is_confirmed',true);

    const activePings=(pings||[]).filter(p=>p.lat&&p.lng);
    const coords=activePings.map(p=>[parseFloat(p.lat),parseFloat(p.lng)]);

    // Planned route
    const pr=log.planned_route;
    if(pr?.polyline){
      const pc=decodePolyline(pr.polyline);
      if(pc.length>1){
        const pl=L.polyline(pc,{color:multiMode?tripColor:'#1E5FAE',weight:4,opacity:.65,dashArray:'8 5'}).addTo(_fleetMap);
        pl.bindPopup(`<b>Planned route</b><br>${log.driver_name||'Driver'} · ${{outbound:'Outbound',return:'Return',job_to_job:'Job→Job'}[log.leg_type]||''}<br>${pr.distance_miles!=null?pr.distance_miles.toFixed(1)+' mi':'—'} · ${pr.duration_text||fmtDur(pr.duration_seconds)||'—'}`);
        _overlayLayers.push(pl);
        allBounds=allBounds?allBounds.extend(pl.getBounds()):pl.getBounds();
      }
    }

    // Ping connecting line
    if(coords.length>1){
      const gl=L.polyline(coords,{color:multiMode?tripColor+'80':'rgba(255,255,255,.2)',weight:2}).addTo(_fleetMap);
      _overlayLayers.push(gl);
      const lb=L.latLngBounds(coords);
      allBounds=allBounds?allBounds.extend(lb):lb;
    }

    // Individual ping dots — RAG color if single trip, trip color if multi
    activePings.forEach((p,i)=>{
      const lat=parseFloat(p.lat), lng=parseFloat(p.lng);
      // Single trip: use ping_health RAG colors; Multi trip: use trip palette color
      const ragColors={green:'#6AB34F',amber:'#F4A93A',red:'#f87171',gray:'#888780'};
      const fillColor=multiMode ? tripColor : (ragColors[p.ping_health||'gray']||'#888780');
      const isEndpoint=i===0||i===activePings.length-1;
      // Larger dots: endpoints 10px, middle 7px (up from 4px)
      const r=isEndpoint?10:7;
      const m=L.circleMarker([lat,lng],{
        radius:r,color:'#fff',weight:2,fillColor,fillOpacity:1
      }).addTo(_fleetMap);
      const dev=p.deviation_m!=null?Math.round(p.deviation_m)+'m from route':'No deviation data';
      const spd=p.speed!=null?Math.round(p.speed*2.237)+' mph':'—';
      m.bindPopup(`<div style="font-size:12px;min-width:140px">
        <b>${i===0?'Departed':i===activePings.length-1?'Last ping':'Ping '+(i+1)}</b><br>
        ${log.driver_name||''}${log.leg_type?' · '+log.leg_type:''}<br>
        ${fmtTime(p.recorded_at)}<br>
        <span style="color:${fillColor}">${dev}</span><br>
        Speed: ${spd}
      </div>`);
      _overlayLayers.push(m);
    });

    // Departure marker
    if(coords.length>0){
      const depIcon=L.divIcon({
        html:`<div style="background:${multiMode?tripColor:'#1E5FAE'};color:#fff;font-size:9px;
          font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;
          border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)">Start</div>`,
        className:'',iconAnchor:[16,10]
      });
      const dm=L.marker(coords[0],{icon:depIcon}).addTo(_fleetMap);
      dm.bindPopup(`<b>Departed</b><br>${log.driver_name||''}<br>${fmtTime(log.started_at)}`);
      _overlayLayers.push(dm);
    }

    // Stop markers
    (stops||[]).filter(s=>s.lat&&s.lng).forEach(s=>{
      const durMin=s.duration_secs?Math.round(s.duration_secs/60):'?';
      const icon=L.divIcon({
        html:`<div style="background:#a855f7;color:#fff;font-size:9px;font-weight:700;
          padding:2px 6px;border-radius:4px;white-space:nowrap;border:2px solid #fff;
          box-shadow:0 1px 4px rgba(0,0,0,.5)">${durMin}m</div>`,
        className:'',iconAnchor:[16,10]
      });
      const sm=L.marker([parseFloat(s.lat),parseFloat(s.lng)],{icon}).addTo(_fleetMap);
      sm.bindPopup(`<b style="color:#a855f7">Stop · ${durMin} min</b><br>Started: ${fmtTime(s.started_at)}`);
      _overlayLayers.push(sm);
    });

    // Destination marker
    if(log.dest_lat&&log.dest_lng){
      const dlat=parseFloat(log.dest_lat), dlng=parseFloat(log.dest_lng);
      const destIcon=L.divIcon({
        html:`<div style="background:${multiMode?tripColor:'#6AB34F'};color:#fff;font-size:9px;
          font-weight:700;padding:2px 7px;border-radius:4px;white-space:nowrap;
          border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)">
          ${log._ts?.client_name||'Dest'}</div>`,
        className:'',iconAnchor:[20,10]
      });
      const dest=L.marker([dlat,dlng],{icon:destIcon}).addTo(_fleetMap);
      dest.bindPopup(`<b>Destination</b><br>${log._ts?.client_name||''}`);
      _overlayLayers.push(dest);
      if(allBounds) allBounds=allBounds.extend([dlat,dlng]);
      else allBounds=L.latLngBounds([[dlat,dlng]]);
    }
  }

  // Add "Clear route" button to map
  const clearCtrl=L.control({position:'topright'});
  clearCtrl.onAdd=()=>{
    const d=L.DomUtil.create('div');
    d.innerHTML=`<button onclick="clearOverlays()" style="
      background:rgba(17,31,51,.92);border:1px solid rgba(255,255,255,.2);
      border-radius:6px;color:#e8f0f8;font-size:12px;padding:6px 12px;cursor:pointer;
      display:flex;align-items:center;gap:5px;font-family:inherit;
      box-shadow:0 2px 8px rgba(0,0,0,.4)">
      <i class="ti ti-x"></i> Clear route
    </button>`;
    return d;
  };
  clearCtrl.addTo(_fleetMap);
  _overlayLayers.push(clearCtrl);

  if(allBounds) setTimeout(()=>_fleetMap.fitBounds(allBounds,{padding:[60,60]}),100);
  if(_drawerOpen) toggleDrawer();
}

// ════════════════════════════════════════════════════════════════════════════
// DRAWER
// ════════════════════════════════════════════════════════════════════════════
function toggleDrawer(){
  _drawerOpen=!_drawerOpen;
  document.getElementById('trips-drawer').classList.toggle('open',_drawerOpen);
  if(_drawerOpen) renderDrawer();
}

function renderDrawer(search=''){
  if(!_drawerOpen) return;
  const q=(search||document.getElementById('drawer-search')?.value||'').toLowerCase();
  const body=document.getElementById('drawer-body');

  // Boarding now — passengers getting into vehicles, no travel_log yet
  const boardGroups=_filteredBoarding.filter(g=>{
    if(!q) return true;
    return (g._ts?.client_name||'').toLowerCase().includes(q)||
      (g.driver_name||'').toLowerCase().includes(q)||
      (g.vehicle_plate||'').toLowerCase().includes(q);
  });
  const boardingHtml=boardGroups.length?`<div class="job-group">
    <div class="job-header">
      <div class="job-header-name" style="color:#7eb8f7;display:flex;align-items:center;gap:5px">
        <i class="ti ti-clock" style="font-size:12px"></i> Boarding now
      </div>
    </div>
    ${boardGroups.map(g=>{
      const pax=g._pax||[];
      const paxNames=pax.map(p=>(p.full_name||'').split(' ')[0]).join(', ');
      return `<div class="trip-row" onclick="focusBoardingGroup('${g.id}')">
        <div class="trip-row-content">
          <div class="trip-row-top">
            <span class="trip-driver">${g.driver_name||'Driver'}</span>
            <span class="trip-leg-badge">${g.vehicle_plate||'—'}</span>
            <span class="trip-time">${g.started_at?fmtTime(g.started_at):'—'}</span>
          </div>
          <div class="trip-row-detail">
            <span class="status-pill sp-boarding">Boarding</span>
            <span class="trip-pax-count"><i class="ti ti-users" style="font-size:10px"></i> ${pax.length}</span>
            ${paxNames?`<span class="trip-pax-names">${paxNames}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`:'';

  // Group by job
  const groups={};
  _filtered.forEach(log=>{
    const key=log.timesheet_id||log.id;
    if(!groups[key]) groups[key]={ts:log._ts||{},logs:[]};
    groups[key].logs.push(log);
  });

  const gArr=Object.values(groups).filter(g=>{
    if(!q) return true;
    return (g.ts.client_name||'').toLowerCase().includes(q)||
      g.logs.some(l=>(l.driver_name||'').toLowerCase().includes(q)||
                     (l.vehicle_plate||'').toLowerCase().includes(q));
  });

  if(!gArr.length&&!boardGroups.length){
    body.innerHTML='<div style="padding:2rem;text-align:center;color:var(--text3);font-size:12px">No trips match</div>';
    return;
  }

  body.innerHTML=boardingHtml+gArr.map(g=>{
    const ts=g.ts;
    const jobName=ts.client_name
      ?`${ts.client_name}${ts.store_number?' · Store '+ts.store_number:''}${ts.city?' · '+ts.city+(ts.state?', '+ts.state:''):''}`
      :'Unknown Job';
    const legs=g.logs.sort((a,b)=>new Date(a.started_at||0)-new Date(b.started_at||0));
    return `<div class="job-group">
      <div class="job-header">
        <div class="job-header-name">${jobName}</div>
      </div>
      ${legs.map(log=>{
        const sel=_selected.has(log.id);
        const h=calcTripHealth(log);
        const s=tripStatusLabel(log);
        const pax=log._pax||[];
        const paxNames=pax.map(p=>(p.full_name||'').split(' ')[0]).join(', ');
        const legLabel={outbound:'Outbound',return:'Return',job_to_job:'Job→Job'}[log.leg_type]||'—';
        return `<div class="trip-row${sel?' selected':''}" onclick="toggleSelect('${log.id}',event)">
          <input type="checkbox" class="trip-row-cb" ${sel?'checked':''}
            onclick="toggleSelect('${log.id}',event)" onchange="return false"/>
          <div class="trip-row-content">
            <div class="trip-row-top">
              <span class="trip-driver">${log.driver_name||'Driver'}</span>
              <span class="trip-leg-badge">${legLabel}</span>
              <span class="trip-time">${log.started_at?fmtTime(log.started_at):'—'}</span>
            </div>
            <div class="trip-row-detail">
              <span class="status-pill ${s==='Boarding'?'sp-boarding':s==='En Route'?'sp-enroute':'sp-destinated'}">${s}</span>
              ${s!=='Boarding'?`<span class="rag ${ragClass(h)}" style="font-size:9px">${healthLabel(h)}</span>`:''}
              <span class="trip-pax-count"><i class="ti ti-users" style="font-size:10px"></i> ${pax.length}</span>
              ${paxNames?`<span class="trip-pax-names">${paxNames}</span>`:''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function focusBoardingGroup(id){
  const g=_boardingGroups.find(x=>x.id===id);
  if(!g) return;
  const lat=parseFloat(g.origin_lat), lng=parseFloat(g.origin_lng);
  if(isNaN(lat)||isNaN(lng)) return;
  if(_drawerOpen) toggleDrawer();
  _fleetMap.setView([lat,lng],14);
  const mapRect=document.getElementById('fleet-map').getBoundingClientRect();
  setTimeout(()=>{
    showMapCard(g,lat,lng,{originalEvent:{clientX:mapRect.left+mapRect.width/2,clientY:mapRect.top+mapRect.height/2}});
  },260); // wait for the drawer-close transition so positioning uses the final map size
}

function toggleSelect(logId,e){
  e.stopPropagation();
  if(_selected.has(logId)) _selected.delete(logId);
  else _selected.add(logId);
  renderDrawer();
}

function clearSelections(){
  _selected.clear();
  clearOverlays();
  renderFleetMarkers();
  renderDrawer();
}

async function viewSelectedOnMapFromDrawer(){
  await viewSelectedOnMap([..._selected]);
}

// Override so FAB version works
const _origViewSelected=viewSelectedOnMap;

// ════════════════════════════════════════════════════════════════════════════
// DATE / REFRESH
// ════════════════════════════════════════════════════════════════════════════
function onDateChange(){
  const val=document.getElementById('filter-date').value;
  const today=new Date().toISOString().split('T')[0];
  _isToday=(val===today);
  if(!_isToday) _boardingGroups=[];
  stopAutoRefresh();
  loadTrips();
  if(_isToday) startAutoRefresh();
  const lb=document.getElementById('live-badge');
  if(lb) lb.style.display=_isToday?'flex':'none';
}

function startAutoRefresh(){
  stopAutoRefresh();
  if(!_isToday) return;
  document.getElementById('live-badge').style.display='flex';
  _refreshTimer=setInterval(async()=>{
    document.getElementById('refresh-ring').style.display='flex';
    await loadTrips();
    setTimeout(()=>{document.getElementById('refresh-ring').style.display='none';},1000);
  },60000);
}

function stopAutoRefresh(){
  if(_refreshTimer){clearInterval(_refreshTimer);_refreshTimer=null;}
  document.getElementById('live-badge').style.display='none';
}

function updateRefreshLabel(){
  const el=document.getElementById('refresh-label');
  if(el) el.textContent=_lastRefresh?'Updated '+fmtTime(_lastRefresh.toISOString()):'Refreshing…';
}

// ════════════════════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════════════════════
function haversineMeters(lat1,lng1,lat2,lng2){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function decodePolyline(enc){
  if(!enc) return [];
  const pts=[];let i=0,lat=0,lng=0;
  while(i<enc.length){
    let b,sh=0,r=0;
    do{b=enc.charCodeAt(i++)-63;r|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
    lat+=(r&1)?~(r>>1):(r>>1);sh=0;r=0;
    do{b=enc.charCodeAt(i++)-63;r|=(b&0x1f)<<sh;sh+=5;}while(b>=0x20);
    lng+=(r&1)?~(r>>1):(r>>1);
    pts.push([lat/1e5,lng/1e5]);
  }
  return pts;
}

function fmtTime(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}

function fmtDur(secs){
  if(!secs) return '—';
  const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60);
  return h>0?`${h}h ${m}m`:`${m}m`;
}

// ── Manual "fetch route" — explicit, per-leg, one attempt per session ──────
// This calls the same paid Google Routes API the driver app uses. It must
// NEVER fire automatically, on a timer, or in a retry loop — only from an
// explicit manager click, and capped at one attempt per leg per page
// session, full stop. GPS pings alone still give a workable picture of what
// happened on a leg even with no plotted route, so this is a convenience
// worth a single deliberate try, not something worth risking API quota on.
const _routeRetriedIds = new Set();

async function retryPlannedRouteMgr(logId, btnEl){
  if(_routeRetriedIds.has(logId)) return; // hard cap — no exceptions, no re-arming
  _routeRetriedIds.add(logId);
  if(btnEl){ btnEl.disabled=true; btnEl.innerHTML='<i class="ti ti-loader-2"></i> Fetching…'; }

  const log=_allLogs.find(l=>l.id===logId);
  const originLat=parseFloat(log?.origin_lat), originLng=parseFloat(log?.origin_lng);
  const destLat=parseFloat(log?.dest_lat), destLng=parseFloat(log?.dest_lng);
  if(!log||!originLat||!originLng||!destLat||!destLng){
    if(btnEl) btnEl.innerHTML='Missing coordinates';
    return;
  }

  const ROUTES_KEY='AIzaSyD2P07dJGflMhKsUCVtrltsWxSee6Fw0_M';
  try{
    const resp=await fetch('https://routes.googleapis.com/directions/v2:computeRoutes',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-Goog-Api-Key':ROUTES_KEY,
        'X-Goog-FieldMask':'routes.distanceMeters,routes.duration,routes.polyline.encodedPolyline,routes.legs.steps',
      },
      body:JSON.stringify({
        origin:{location:{latLng:{latitude:originLat,longitude:originLng}}},
        destination:{location:{latLng:{latitude:destLat,longitude:destLng}}},
        travelMode:'DRIVE', routingPreference:'TRAFFIC_UNAWARE',
        computeAlternativeRoutes:false, languageCode:'en-US', units:'IMPERIAL',
      }),
    });
    const data=await resp.json();
    const route=data.routes?.[0];
    if(data.error||!route){
      if(btnEl) btnEl.innerHTML='Route unavailable — '+(data.error?.message||'no route found');
      return;
    }

    const distM=route.distanceMeters||0;
    const durSec=parseInt((route.duration||'0s').replace('s',''))||0;
    const polyline=route.polyline?.encodedPolyline||'';
    const routeObj={
      fetched_at:new Date().toISOString(),
      origin:{lat:originLat,lng:originLng}, destination:{lat:destLat,lng:destLng},
      distance_miles:+((distM/1609.34).toFixed(2)), duration_seconds:durSec,
      duration_text:fmtDur(durSec), polyline,
    };

    const {error}=await getSB().from('travel_logs').update({planned_route:routeObj}).eq('id',logId);
    if(error){ if(btnEl) btnEl.innerHTML='Save failed — '+error.message; return; }

    if(polyline){
      const coords=decodePolyline(polyline);
      if(coords.length) await getSB().from('travel_logs').update({directions:coords}).eq('id',logId);
    }

    if(btnEl) btnEl.innerHTML='<i class="ti ti-check"></i> Route added';
    await loadTrips(); // refresh so the dashed planned-route line picks it up on the map
  }catch(e){
    if(btnEl) btnEl.innerHTML='Retry failed — '+e.message;
  }
}
